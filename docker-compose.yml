services:
  gateway:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hordeforge-gateway
    env_file:
      - .env
    environment:
      HORDEFORGE_GATEWAY_URL: "http://gateway:8000"

      # Default local/lightweight mode
      HORDEFORGE_STORAGE_BACKEND: "${HORDEFORGE_STORAGE_BACKEND:-json}"
      HORDEFORGE_QUEUE_BACKEND: "${HORDEFORGE_QUEUE_BACKEND:-memory}"
      HORDEFORGE_VECTOR_STORE_MODE: "${HORDEFORGE_VECTOR_STORE_MODE:-auto}"
      HORDEFORGE_STORAGE_DIR: "${HORDEFORGE_STORAGE_DIR:-/app/.hordeforge_data}"

      # Optional external services (used in team mode, ignored/fallback in local mode)
      HORDEFORGE_DATABASE_URL: "${HORDEFORGE_DATABASE_URL:-}"
      HORDEFORGE_REDIS_URL: "${HORDEFORGE_REDIS_URL:-}"
      QDRANT_HOST: "${QDRANT_HOST:-qdrant}"
      QDRANT_PORT: "${QDRANT_PORT:-6333}"

      # RAG / Memory / Context
      HORDEFORGE_MEMORY_ENABLED: "${HORDEFORGE_MEMORY_ENABLED:-true}"
      HORDEFORGE_CONTEXT_RAG_ENABLED: "${HORDEFORGE_CONTEXT_RAG_ENABLED:-true}"
      HORDEFORGE_CONTEXT_MEMORY_ENABLED: "${HORDEFORGE_CONTEXT_MEMORY_ENABLED:-true}"
      HORDEFORGE_CONTEXT_COMPRESSION_ENABLED: "${HORDEFORGE_CONTEXT_COMPRESSION_ENABLED:-true}"
      HORDEFORGE_CONTEXT_DEDUPLICATION_ENABLED: "${HORDEFORGE_CONTEXT_DEDUPLICATION_ENABLED:-true}"
      HORDEFORGE_CONTEXT_MAX_TOKENS: "${HORDEFORGE_CONTEXT_MAX_TOKENS:-4000}"
    depends_on: []
    command: uvicorn scheduler.gateway:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    volumes:
      - hordeforge_data:/app/.hordeforge_data
      - hordeforge_logs:/app/logs
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)"
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # Optional local MCP bridge. Keeps local mode lightweight: no external Qdrant required.
  # This service is not started by default because the init pipeline already supports auto mode
  # with fallback logic. Start it only when you want a local MCP endpoint for IDE plugins.
  qdrant-mcp-local:
    image: python:3.12-slim
    container_name: hordeforge-qdrant-mcp-local
    profiles: ["mcp"]
    working_dir: /app
    command: >
      sh -c "pip install -U uv &&
             uvx mcp-server-qdrant --transport streamable-http"
    environment:
      FASTMCP_HOST: "0.0.0.0"
      FASTMCP_PORT: "8001"
      QDRANT_LOCAL_PATH: "/qdrant-local"
      COLLECTION_NAME: "${MCP_COLLECTION_NAME:-hordeforge_repo}"
      EMBEDDING_MODEL: "${MCP_EMBEDDING_MODEL:-sentence-transformers/all-MiniLM-L6-v2}"
    volumes:
      - hordeforge_qdrant_local_data:/qdrant-local
    ports:
      - "8001:8001"

  # Team/shared mode services
  db:
    image: postgres:16
    container_name: hordeforge-postgres
    profiles: ["team"]
    environment:
      POSTGRES_USER: hordeforge
      POSTGRES_PASSWORD: hordeforge
      POSTGRES_DB: hordeforge
    ports:
      - "5432:5432"
    volumes:
      - hordeforge_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hordeforge"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: hordeforge-redis
    profiles: ["team"]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    container_name: hordeforge-qdrant
    profiles: ["team"]
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - hordeforge_qdrant_data:/qdrant/storage
    environment:
      QDRANT__STORAGE__WAL__FSYNC: "false"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:6333/healthz || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10

  qdrant-mcp:
    image: python:3.12-slim
    container_name: hordeforge-qdrant-mcp
    profiles: ["team"]
    working_dir: /app
    command: >
      sh -c "pip install -U uv &&
             uvx mcp-server-qdrant --transport streamable-http"
    environment:
      FASTMCP_HOST: "0.0.0.0"
      FASTMCP_PORT: "8001"
      QDRANT_URL: "http://qdrant:6333"
      COLLECTION_NAME: "${MCP_COLLECTION_NAME:-hordeforge_repo}"
      EMBEDDING_MODEL: "${MCP_EMBEDDING_MODEL:-sentence-transformers/all-MiniLM-L6-v2}"
    depends_on:
      qdrant:
        condition: service_healthy
    ports:
      - "8001:8001"

volumes:
  hordeforge_data:
  hordeforge_logs:
  hordeforge_db:
  hordeforge_qdrant_data:
  hordeforge_qdrant_local_data:
