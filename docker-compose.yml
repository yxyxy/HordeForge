services:
  db:
    image: postgres:16
    container_name: hordeforge-postgres
    environment:
      POSTGRES_USER: hordeforge
      POSTGRES_PASSWORD: hordeforge
      POSTGRES_DB: hordeforge
    ports:
      - "5432:5432"
    volumes:
      - hordeforge_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hordeforge"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: hordeforge-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    container_name: hordeforge-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - hordeforge_qdrant_data:/qdrant/storage
    environment:
      - QDRANT__STORAGE__WAL__FSYNC=false

  gateway:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hordeforge-gateway
    env_file:
      - .env
    environment:
      - HORDEFORGE_GATEWAY_URL=http://gateway:8000
      - HORDEFORGE_DATABASE_URL=postgresql+psycopg://hordeforge:hordeforge@db:5432/hordeforge
      - HORDEFORGE_REDIS_URL=redis://redis:6379/0
      - HORDEFORGE_QDRANT_URL=http://qdrant:6333
      - HORDEFORGE_STORAGE_BACKEND=json
      - HORDEFORGE_QUEUE_BACKEND=memory
    depends_on:
      db:
        condition: service_healthy
      # Qdrant optional - app handles unavailability gracefully
      qdrant:
        condition: service_started
    command: uvicorn scheduler.gateway:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  hordeforge_db:
  hordeforge_qdrant_data:
