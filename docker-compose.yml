version: '3.8'

services:
  horde-app:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ./data:/app/data
      - ~/.horde:/root/.horde
    environment:
      - PYTHONPATH=/app
    command: ["python", "-m", "cli.horde_cli"]

  horde-cli:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ./data:/app/data
      - ~/.horde:/root/.horde
    entrypoint: ["horde"]
    command: ["--help"]