# pipelines/ci_fix_pipeline.yaml
# CI Incident Triage + Handoff Pipeline for HordeForge
# Description: Analyzes failing CI and creates agent-opened issue for downstream planning pipeline.

pipeline_name: ci_fix_pipeline
description: |
  Pipeline for monitoring CI failures, extracting diagnostics, and opening
  a structured handoff issue for downstream implementation pipeline.

triggers:
  - ci_failure_detected
  - scheduled_trigger

steps:

  - name: ci_failure_analyzer
    agent: ci_failure_analyzer
    description: Analyze failed CI run and detect root cause
    input:
      repository: "{{repository}}"
      ci_run: "{{ci_run}}"
    output: "{{failure_analysis}}"
    on_failure: create_issue_for_human

  - name: ci_incident_handoff
    agent: ci_incident_handoff
    description: Create triage issue and mark it agent:opened for downstream scanner/planning
    condition: "{{ ci_run.conclusion == 'failure' or ci_run.status == 'failed' }}"
    input:
      repository: "{{repository}}"
      ci_run: "{{ci_run}}"
      failure_analysis: "{{failure_analysis}}"
      source_pipeline: "ci_fix_pipeline"
      github_token: "{{github_token}}"
    output: "{{ci_issue}}"
    on_failure: create_issue_for_human

logging:
  level: INFO
  log_decisions: true
  log_artifacts: true
  post_to_github: true

# Notes:
# - This pipeline intentionally does not modify code or merge PRs.
# - It only performs deterministic triage and handoff to issue-solving pipeline.
# - Downstream scanner should pick issues by `agent:opened` label.
