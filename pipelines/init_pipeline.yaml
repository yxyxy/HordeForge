pipeline_name: init_pipeline

description: |
  Pipeline to initialize a new project for autonomous AI agents.

triggers:
  - manual_trigger

steps:

  - name: repo_connector
    agent: repo_connector
    description: Clone repository and load metadata
    input:
      repo_url: "{{repo_url}}"
      token: "{{github_token}}"
    output: "{{repository_metadata}}"
    on_failure: stop_pipeline

  - name: rag_initializer
    agent: rag_initializer
    description: Populate RAG context from code, docs, wiki
    depends_on:
      - repo_connector
    depends_on_explicit: true
    input:
      repository_metadata: "{{repository_metadata}}"
    output: "{{rag_index}}"
    on_failure: stop_pipeline

  - name: memory_agent
    agent: memory_agent
    description: Initialize agent memory with repo history and context
    depends_on:
      - rag_initializer
    depends_on_explicit: true
    input:
      repository_metadata: "{{repository_metadata}}"
      rag_index: "{{rag_index}}"
    output: "{{memory_state}}"
    on_failure: stop_pipeline

  - name: architecture_evaluator
    agent: architecture_evaluator
    description: Analyze project architecture
    depends_on:
      - repo_connector
    input:
      repository_metadata: "{{repository_metadata}}"
    output: "{{architecture_report}}"
    on_failure: log_warning

  - name: test_analyzer
    agent: test_analyzer
    description: Evaluate tests and coverage
    depends_on:
      - repo_connector
    input:
      repository_metadata: "{{repository_metadata}}"
    output: "{{test_coverage_report}}"
    on_failure: log_warning

  - name: pipeline_initializer
    agent: pipeline_initializer
    description: Setup pipelines and CI
    depends_on:
      - memory_agent
      - architecture_evaluator
      - test_analyzer
    depends_on_explicit: true
    input:
      repository_metadata: "{{repository_metadata}}"
      memory_state: "{{memory_state}}"
      architecture_report: "{{architecture_report}}"
      test_coverage_report: "{{test_coverage_report}}"
    output: "{{pipeline_status}}"
    on_failure: escalate_to_human

logging:
  level: INFO
  log_decisions: true
  post_to_github: true