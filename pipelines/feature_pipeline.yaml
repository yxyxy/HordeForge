# pipelines/feature_pipeline.yaml
# Feature Pipeline for HordeForge
# Description: Production execution pipeline from prepared plan to PR/merge

pipeline_name: feature_pipeline
description: |
  Production-safe execution pipeline for implementing a prepared issue plan.
  Steps include:
    - Code implementation on branch `horde/<issue-number>-<slug>`
    - Test execution + optional fix loop
    - LLM/static review
    - Merge decision with hard gates:
      * review approved
      * tests passed
      * PR exists

triggers:
  - issue_created
  - manual_trigger
  - scheduled_trigger

steps:
  - name: rag_initializer
    agent: rag_initializer
    description: Initialize RAG with repository data
    input:
      repository: "{{repository}}"
    output: "{{rag_context}}"
    on_failure: continue

  - name: memory_retrieval
    agent: memory_agent
    description: Retrieve similar tasks from memory
    input:
      query: "{{issue.title}} {{issue.body}}"
    output: "{{memory_context}}"
    on_failure: continue

  - name: code_generator
    agent: code_generator
    description: Implement code according to prepared issue plan from pipeline inputs
    input:
      issue: "{{issue}}"
      repository: "{{repository}}"
      memory_context: "{{memory_context}}"
      require_llm: true
    output: "{{code_patch}}"
    on_failure: retry_step

  - name: test_runner
    agent: test_runner
    description: Run tests on code patch
    input:
      code_patch: "{{code_patch}}"
      tests: "{{tests}}"
      require_llm: true
    output: "{{test_results}}"
    on_failure: trigger_fix_loop

  - name: fix_agent
    agent: fix_agent
    description: Iteratively fix failing tests until all pass
    condition: "{{ test_runner.test_results.failed > 0 }}"
    input:
      code_patch: "{{code_patch}}"
      test_results: "{{test_results}}"
      require_llm: true
    output: "{{fixed_code_patch}}"
    retry_limit: 5
    on_failure: create_issue_for_human

  - name: review_agent
    agent: review_agent
    description: Review PR automatically, comment issues, approve or request changes
    input:
      fixed_code_patch: "{{fixed_code_patch}}"
      repository: "{{repository}}"
      memory_context: "{{memory_context}}"
      require_llm: true
    output: "{{review_result}}"
    on_failure: create_issue_for_human

  - name: memory_writer
    agent: memory_agent
    description: Save results to memory
    input:
      task_description: "{{issue.title}}"
      result: "{{review_result}}"
      code_patch: "{{fixed_code_patch}}"
    output: "{{memory_write_result}}"
    on_failure: continue

  - name: pr_merge_agent
    agent: pr_merge_agent
    description: Merge PR only when safety gates pass (review/tests/PR)
    input:
      review_result: "{{review_result}}"
      test_results: "{{test_results}}"
      code_patch: "{{fixed_code_patch}}"
      repository: "{{repository}}"
    output: "{{merge_status}}"
    on_failure: create_issue_for_human

loops:
  - condition: "{{test_runner.test_results.failed}} > 0"
    steps:
      - fix_agent
      - test_runner

# Logging

logging:
  level: INFO
  log_decisions: true
  log_artifacts: true
  post_to_github: true

# Notes:

# - Each step follows AGENT_SPEC.md contract
# - All outputs must be validated JSON
# - Planning artifacts (DoD/BDD/TDD/spec/subtasks/tests) are expected to be prepared upstream.
# - Merge is guarded by test/review/PR gates in pr_merge_agent.
