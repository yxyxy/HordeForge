# pipelines/issue_scanner_pipeline.yaml
# Issue Scanner Pipeline for HordeForge
# Description: Pipeline to scan GitHub issues and return eligible issues for processing.

pipeline_name: issue_scanner_pipeline
description: |
  Pipeline to scan GitHub issues and dispatch eligible issues for processing.
  Fetches open issues from GitHub repository, identifies agent-opened/planning/ready/fixed issues,
  prepares DoD/BDD/TDD planning artifacts, posts planning comment,
  and dispatches feature_pipeline asynchronously.
  Uses repository settings from initialization context.

triggers:
  - manual_trigger

steps:
  - name: repo_connector
    agent: repo_connector
    description: Fetch open issues from GitHub repository using initialized settings
    input:
      repo_url: "{{repo_url}}"
      github_token: "{{github_token}}"
      operation: "fetch_issues"
      state: "open"
      labels: ["agent:opened", "agent:planning", "agent:ready", "agent:fixed"]
    output: "{{issues_result}}"
    on_failure: stop_pipeline

  - name: issue_classification
    agent: issue_scanner
    description: Process and classify fetched issues
    input:
      scan_options:
        labels: ["agent:opened", "agent:planning", "agent:ready", "agent:fixed"]
        state: "open"
        max_issues: 50
        include_comments: true
    output: "{{processed_issues}}"
    on_failure: continue

  - name: issue_dispatch
    agent: issue_pipeline_dispatcher
    description: Handle staged labels (opened/planning/ready/fixed), plan when needed, dispatch or close
    input:
      target_pipeline: "feature_pipeline"
    output: "{{dispatch_report}}"
    on_failure: continue

logging:
  level: INFO
  log_decisions: true
  log_artifacts: true
  post_to_github: false

# Notes:
# - Uses repository settings from initialization context (repo_url, github_token)
# - Falls back to explicit inputs if context is not available
# - Processes issues with "agent:opened", "agent:planning", "agent:ready", "agent:fixed" labels
# - Dispatches prepared issues to feature_pipeline in queued/async mode
