[tool.pytest.ini_options]
pythonpath = ["."]
testpaths = ["tests"]
addopts = "-q -p no:cacheprovider"
asyncio_mode = "auto"
norecursedirs = [
  ".git",
  ".venv",
  "node_modules",
  ".pytest_tmp",
  ".pytest_tmp_runtime",
  "tests/_tmp_runtime",
  "tests/_tmp_pytest",
  "tests/_tmp_*",
]
markers = [
  "slow: long-running tests",
  "performance: performance-focused tests",
  "benchmark: benchmark tests",
]

[tool.black]
line-length = 100
target-version = ["py310", "py311", "py312"]

[tool.ruff]
line-length = 100
target-version = "py310"
extend-exclude = ["pytest-cache-files-*"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]
ignore = ["E501"]
