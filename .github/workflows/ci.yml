# CI Workflow for HordeForge repository
name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-unit:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.8, 3.9, '3.10']
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install poetry
        poetry install
    - name: Run unit tests with detailed output
      run: |
        poetry run python -m pytest tests/unit/ -v --tb=short
      env:
        PYTHONPATH: ${{ github.workspace }}/src
    - name: Upload coverage reports
      if: matrix.python-version == '3.10'
      uses: actions/upload-artifact@v3
      with:
        name: coverage-report
        path: coverage.xml

  test-integration:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10']
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install poetry
        poetry install
    - name: Run integration tests
      run: |
        poetry run python -m pytest tests/integration/ -v --tb=short
      env:
        PYTHONPATH: ${{ github.workspace }}/src

  pipeline-audit:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install poetry
        poetry install
    - name: Run pipeline catalog validation
      run: |
        poetry run python -c "from src.pipelines import validate_catalog; validate_catalog()"
    - name: Run smoke tests
      run: |
        poetry run python -m pytest tests/smoke/ -v --tb=short
      env:
        PYTHONPATH: ${{ github.workspace }}/src
