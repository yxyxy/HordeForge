# Default values for hordeforge chart

replicaCount: 2

image:
  repository: hordeforge/hordeforge
  pullPolicy: IfNotPresent
  tag: "latest"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

service:
  type: ClusterIP
  port: 80
  targetPort: 8000

ingress:
  enabled: true
  className: nginx
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: hordeforge.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: hordeforge-tls
      hosts:
        - hordeforge.example.com

resources:
  requests:
    memory: 256Mi
    cpu: 250m
  limits:
    memory: 512Mi
    cpu: 500m

livenessProbe:
  httpGet:
    path: /health
    port: 8000
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /ready
    port: 8000
  initialDelaySeconds: 10
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70

persistence:
  enabled: false
  storageClass: ""
  accessMode: ReadWriteOnce
  size: 10Gi

env:
  - name: HORDEFORGE_GATEWAY_URL
    value: "http://localhost:8000"
  - name: HORDEFORGE_STORAGE_DIR
    value: "/data"
  - name: HORDEFORGE_MAX_PARALLEL_WORKERS
    value: "4"

nodeSelector: {}

tolerations: []

affinity: {}
