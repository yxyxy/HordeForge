apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: hordeforge
  labels:
    app: hordeforge
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
    - hosts:
        - hordeforge.example.com
      secretName: hordeforge-tls
  rules:
    - host: hordeforge.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: hordeforge
                port:
                  number: 80
