apiVersion: apps/v1
kind: Deployment
metadata:
  name: hordeforge
  labels:
    app: hordeforge
    version: v0.1.0
spec:
  replicas: 2
  selector:
    matchLabels:
      app: hordeforge
  template:
    metadata:
      labels:
        app: hordeforge
        version: v0.1.0
    spec:
      containers:
        - name: hordeforge
          image: hordeforge/hordeforge:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
              name: http
              protocol: TCP
          env:
            - name: HORDEFORGE_GATEWAY_URL
              value: "http://localhost:8000"
            - name: HORDEFORGE_STORAGE_DIR
              value: "/data"
            - name: HORDEFORGE_MAX_PARALLEL_WORKERS
              value: "4"
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          emptyDir: {}
